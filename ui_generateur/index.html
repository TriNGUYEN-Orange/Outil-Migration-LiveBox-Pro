<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Migration Livebox Pro</title>
    <link rel="stylesheet" href="view.css">
</head>
<body>

    <header class="en-tete-principal">
        <div class="logo">Orange</div>
        <div class="titre-site">Assistance Pro</div>
    </header>

    <div id="barreRecap" class="barre-recap masque-complet">
        <span id="recapAncienne" class="pillule-recap">Box actuelle : -</span>
        <span class="separateur-recap">→</span>
        <span id="recapNouvelle" class="pillule-recap">Nouvelle Box : -</span>
        
        <button id="boutonModifier" class="bouton-modifier" onclick="resetToInitialView()">Modifier les choix</button>
        
        <span class="titre-recap">Migration Livebox Pro</span>
    </div>

    <h1>Migration Livebox Pro</h1>

    <div id="zoneWizard">
        <div id="etape1" class="conteneur-question masque"> 
            <p>Quelle est votre box actuelle ?</p>
            <div class="groupe-boutons">
                <button class="bouton-choix" onclick="choisirAncienne(event, 'livebox3pro')">Livebox 3 Pro</button>
                <button class="bouton-choix" onclick="choisirAncienne(event, 'livebox4pro')">Livebox 4 Pro</button>
            </div>
        </div>

        <div id="etape2" class="conteneur-question masque">
            <p>Quelle est votre nouvelle box ?</p>
            <div class="groupe-boutons">
                <button class="bouton-choix" onclick="choisirNouvelle(event, 'livebox5')">Livebox 5</button>
                <button class="bouton-choix" onclick="choisirNouvelle(event, 'livebox6')">Livebox 6</button>
                <button class="bouton-choix" onclick="choisirNouvelle(event, 'livebox7')">Livebox 7</button>
            </div>
        </div>
    </div>

    <div id="pageInstructions" class="masque">
        <div id="contenuInstructions">
            </div>
    </div>

    <script src="steps.js"></script>
    <script src="logic.js"></script>
</body>
</html>
